name: Native SDK Pre-built Binaries

on:
  push:
    paths:
      - 'src/**'
      - 'include/**'
      - 'build.zig'
      - 'build.zig.zon'
    branches:
      - main

env:
  ZIG_VERSION: '0.15.2'

jobs:
  # Run tests first on all platforms (includes integration tests with example-server)
  test:
    uses: ./.github/workflows/tests.yml

  # Build pre-built binaries for all targets
  build:
    needs: test
    strategy:
      matrix:
        include:
          # macOS
          - os: macos-latest
            target: aarch64-macos
            artifact_name: colyseus-macos-arm64
          - os: macos-latest
            target: x86_64-macos
            artifact_name: colyseus-macos-x86_64
          # Linux
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            artifact_name: colyseus-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-linux-gnu
            artifact_name: colyseus-linux-arm64
          # Windows
          - os: windows-latest
            target: x86_64-windows
            artifact_name: colyseus-windows-x86_64
          # iOS (cross-compile from macOS)
          - os: macos-latest
            target: aarch64-ios
            artifact_name: colyseus-ios-arm64
    runs-on: ${{ matrix.os }}
    env:
      IS_WASM: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libc6-dev

      - name: Build library
        shell: bash
        run: |
          zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast -Dexamples=false

      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package/lib
          
          # Copy library
          cp zig-out/lib/libcolyseus.a package/lib/
          
          # Copy all headers (already installed by zig build)
          cp -r zig-out/include package/
          
          # Create archive
          tar -czvf ${{ matrix.artifact_name }}.tar.gz -C package .

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package/lib
          
          # Copy library
          Copy-Item zig-out/lib/colyseus.lib package/lib/
          
          # Copy all headers (already installed by zig build)
          Copy-Item -Recurse zig-out/include package/
          
          # Create archive
          Compress-Archive -Path package/* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
          if-no-files-found: ignore

  # Build WASM library using emsdk/emcc
  build-wasm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '4.0.23'

      - name: Verify emcc
        run: emcc --version

      - name: Build WASM library
        run: ./build-wasm.sh

      - name: Package artifacts
        run: |
          mkdir -p package/lib
          cp build/libcolyseus.a package/lib/
          
          # Copy headers
          cp -r include package/
          cp third_party/uthash/src/uthash.h package/include/
          
          tar -czvf colyseus-wasm32.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: colyseus-wasm32
          path: colyseus-wasm32.tar.gz

  # Create GitHub release with all artifacts
  release:
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '\.version\s*=\s*"\K[^"]+' build.zig.zon)
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Package source code
        run: |
          # Write the archive to the parent directory so tar doesn't see
          # its own output file (or the directory's mtime change) while
          # reading "." — that triggers "file changed as we read it".
          tar -czf "${RUNNER_TEMP}/colyseus-source-${{ steps.version.outputs.version }}.tar.gz" \
            --exclude=platforms \
            --exclude=example-server \
            --exclude=.git \
            --exclude='*.tar.gz' \
            .
          mv "${RUNNER_TEMP}/colyseus-source-${{ steps.version.outputs.version }}.tar.gz" .

      - name: Package all-targets bundle
        run: |
          mkdir -p all-targets/lib

          # Extract each artifact and rename the library to include the target
          declare -A TARGET_MAP=(
            ["colyseus-macos-arm64"]="aarch64-macos"
            ["colyseus-macos-x86_64"]="x86_64-macos"
            ["colyseus-linux-x86_64"]="x86_64-linux-gnu"
            ["colyseus-linux-arm64"]="aarch64-linux-gnu"
            ["colyseus-ios-arm64"]="aarch64-ios"
            ["colyseus-wasm32"]="wasm32"
          )

          HEADERS_COPIED=false
          for artifact_name in "${!TARGET_MAP[@]}"; do
            target="${TARGET_MAP[$artifact_name]}"
            archive="artifacts/${artifact_name}/${artifact_name}.tar.gz"
            if [ -f "$archive" ]; then
              tmpdir=$(mktemp -d)
              tar -xzf "$archive" -C "$tmpdir"
              cp "$tmpdir/lib/libcolyseus.a" "all-targets/lib/libcolyseus.${target}.a"
              if [ "$HEADERS_COPIED" = false ]; then
                cp -r "$tmpdir/include" all-targets/
                HEADERS_COPIED=true
              fi
              rm -rf "$tmpdir"
            fi
          done

          # Windows (zip, .lib extension)
          WIN_ARCHIVE="artifacts/colyseus-windows-x86_64/colyseus-windows-x86_64.zip"
          if [ -f "$WIN_ARCHIVE" ]; then
            tmpdir=$(mktemp -d)
            unzip -q "$WIN_ARCHIVE" -d "$tmpdir"
            cp "$tmpdir/lib/colyseus.lib" "all-targets/lib/colyseus.x86_64-windows.lib"
            if [ "$HEADERS_COPIED" = false ]; then
              cp -r "$tmpdir/include" all-targets/
            fi
            rm -rf "$tmpdir"
          fi

          tar -czvf colyseus-all-targets.tar.gz -C all-targets .

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Colyseus Native SDK - Static Library ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            colyseus-source-${{ steps.version.outputs.version }}.tar.gz
            colyseus-all-targets.tar.gz
          body: |
            ## Pre-built Binaries
            
            Download the appropriate archive for your platform:
            
            | Platform | Architecture | File |
            |----------|--------------|------|
            | macOS | arm64 (Apple Silicon) | `colyseus-macos-arm64.tar.gz` |
            | macOS | x86_64 (Intel) | `colyseus-macos-x86_64.tar.gz` |
            | Linux | x86_64 | `colyseus-linux-x86_64.tar.gz` |
            | Linux | arm64 | `colyseus-linux-arm64.tar.gz` |
            | Windows | x86_64 | `colyseus-windows-x86_64.zip` |
            | iOS | arm64 | `colyseus-ios-arm64.tar.gz` |
            | WebAssembly | wasm32 | `colyseus-wasm32.tar.gz` |
            
            ### Usage
            
            Extract the archive and link the library:
            
            ```c
            // Include headers
            #include <colyseus/client.h>
            #include <colyseus/room.h>
            
            // Link: -L/path/to/lib -lcolyseus
            // Include: -I/path/to/include
            ```
            
            ### Zig Build System
            
            ```zig
            exe.addObjectFile(.{ .cwd_relative = "path/to/lib/libcolyseus.a" });
            exe.addIncludePath(.{ .cwd_relative = "path/to/include" });
            ```
