name: GameMaker Extension Build

on:
  push:
    paths:
      - 'platforms/gamemaker/**'
    branches:
      - main
  pull_request:
    paths:
      - 'platforms/gamemaker/**'
  workflow_dispatch:

jobs:
  # Run test suite first (includes integration tests with example-server)
  test:
    uses: ./.github/workflows/tests.yml

  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version-check.outputs.changed || 'true' }}
      version: ${{ steps.version-check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version changes
        uses: EndBug/version-check@v2
        id: version-check
        with:
          file-name: platforms/gamemaker/version.json
          diff-search: true

      - name: Log version info
        run: |
          echo "Version changed: ${{ steps.version-check.outputs.changed }}"
          echo "Version: ${{ steps.version-check.outputs.version }}"

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build macOS arm64
        working-directory: platforms/gamemaker
        run: zig build -Dtarget=aarch64-macos -Doptimize=ReleaseSafe

      - name: Build macOS x86_64
        working-directory: platforms/gamemaker
        run: zig build -Dtarget=x86_64-macos -Doptimize=ReleaseSafe

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: platforms/gamemaker/zig-out/lib/macos/

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build Linux x86_64
        working-directory: platforms/gamemaker
        run: zig build -Dtarget=x86_64-linux-gnu -Doptimize=ReleaseSafe

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: platforms/gamemaker/zig-out/lib/linux/

  build-windows:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build Windows x86_64
        working-directory: platforms/gamemaker
        run: zig build -Dtarget=x86_64-windows-gnu -Doptimize=ReleaseSafe

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-windows
          path: platforms/gamemaker/zig-out/lib/windows/

  build-ios:
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build iOS arm64
        working-directory: platforms/gamemaker
        run: zig build -Dtarget=aarch64-ios -Doptimize=ReleaseSafe

      - name: Upload iOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-ios
          path: platforms/gamemaker/zig-out/lib/ios/

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Build Android arm64
        working-directory: platforms/gamemaker
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: zig build -Dtarget=aarch64-linux-android -Doptimize=ReleaseSafe

      - name: Build Android arm32
        working-directory: platforms/gamemaker
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: zig build -Dtarget=arm-linux-androideabi -Doptimize=ReleaseSafe

      - name: Build Android x86_64
        working-directory: platforms/gamemaker
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: zig build -Dtarget=x86_64-linux-android -Doptimize=ReleaseSafe

      - name: Upload Android binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-android
          path: platforms/gamemaker/zig-out/lib/android/

  build-wasm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '4.0.23'

      - name: Verify emcc
        run: emcc --version

      - name: Build WASM
        working-directory: platforms/gamemaker
        run: |
          chmod +x build-wasm.sh
          ./build-wasm.sh ReleaseSmall

      - name: Upload WASM binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-wasm
          path: platforms/gamemaker/wasm-out/colyseus_wasm.js

  release:
    needs: [check-version, build-macos, build-ios, build-linux, build-windows, build-android, build-wasm]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create extension directory
        run: mkdir -p Colyseus_SDK/extensions/Colyseus_SDK

      - name: Download macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-macos
          path: Colyseus_SDK/extensions/Colyseus_SDK/macos

      - name: Download iOS binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-ios
          path: Colyseus_SDK/extensions/Colyseus_SDK/ios

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux
          path: Colyseus_SDK/extensions/Colyseus_SDK/linux

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-windows
          path: Colyseus_SDK/extensions/Colyseus_SDK/windows

      - name: Download Android binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-android
          path: Colyseus_SDK/extensions/Colyseus_SDK/android

      - name: Download WASM binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-wasm
          path: Colyseus_SDK/extensions/Colyseus_SDK

      - name: Flatten binaries with GameMaker proxy naming conventions
        run: |
          EXT=Colyseus_SDK/extensions/Colyseus_SDK

          # Main native library (macOS arm64 - referenced in .yy as libcolyseus.0.1.0.dylib)
          cp $EXT/macos/arm64/libcolyseus.0.1.0.dylib $EXT/libcolyseus.0.1.0.dylib

          # Proxy files (GameMaker auto-detects platform from naming convention)
          cp $EXT/windows/x64/colyseus.dll $EXT/colyseus_x64.dll
          cp $EXT/linux/x64/libcolyseus.so $EXT/libcolyseus_linux.so
          cp $EXT/android/arm64/libcolyseus.so $EXT/libcolyseus_arm64.so
          cp $EXT/android/arm32/libcolyseus.so $EXT/libcolyseus_armeabi-v7a.so
          cp $EXT/ios/arm64/libcolyseus.0.1.0.dylib $EXT/libcolyseus_ios.dylib

          # Clean up platform subdirectories
          rm -rf $EXT/macos $EXT/windows $EXT/linux $EXT/android $EXT/ios

      - name: Copy extension files and fix parent references
        run: |
          # Copy .yy files and scripts
          cp platforms/gamemaker/example/BlankProject/extensions/Colyseus_SDK/Colyseus_SDK.yy Colyseus_SDK/extensions/Colyseus_SDK/
          cp -r platforms/gamemaker/example/BlankProject/scripts Colyseus_SDK/

          # Fix parent references to point to our minimal project instead of BlankProject
          jq '.parent = {"name":"Colyseus_SDK","path":"Colyseus_SDK.yyp"}' \
            Colyseus_SDK/extensions/Colyseus_SDK/Colyseus_SDK.yy > tmp.yy && mv tmp.yy Colyseus_SDK/extensions/Colyseus_SDK/Colyseus_SDK.yy
          jq '.parent = {"name":"Colyseus_SDK","path":"Colyseus_SDK.yyp"}' \
            Colyseus_SDK/scripts/Colyseus/Colyseus.yy > tmp.yy && mv tmp.yy Colyseus_SDK/scripts/Colyseus/Colyseus.yy

          # Create minimal .yyp project file so GameMaker can resolve parent references
          cat > Colyseus_SDK/Colyseus_SDK.yyp << 'EOFYYP'
          {
            "$GMProject":"v1",
            "%Name":"Colyseus_SDK",
            "AudioGroups":[
              {"$GMAudioGroup":"v1","%Name":"audiogroup_default","exportDir":"","name":"audiogroup_default","resourceType":"GMAudioGroup","resourceVersion":"2.0","targets":-1}
            ],
            "configs":{"children":[],"name":"Default"},
            "defaultScriptType":0,
            "Folders":[],
            "ForcedPrefabProjectReferences":[],
            "IncludedFiles":[],
            "isEcma":false,
            "LibraryEmitters":[],
            "MetaData":{"IDEVersion":"2024.1400.4.1003"},
            "name":"Colyseus_SDK",
            "resources":[
              {"id":{"name":"Colyseus_SDK","path":"extensions/Colyseus_SDK/Colyseus_SDK.yy"}},
              {"id":{"name":"Colyseus","path":"scripts/Colyseus/Colyseus.yy"}}
            ],
            "resourceType":"GMProject",
            "resourceVersion":"2.0",
            "RoomOrderNodes":[],
            "templateType":"game",
            "TextureGroups":[
              {"$GMTextureGroup":"","%Name":"Default","autocrop":true,"border":2,"compressFormat":"bz2","customOptions":"","directory":"","groupParent":null,"isScaled":true,"loadType":"default","mipsToGenerate":0,"name":"Default","resourceType":"GMTextureGroup","resourceVersion":"2.0","targets":-1}
            ]
          }
          EOFYYP

      - name: List all files
        run: find Colyseus_SDK/ -type f | sort

      - name: Create release zip
        run: zip -r colyseus-gamemaker-${{ needs.check-version.outputs.version }}.zip Colyseus_SDK

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gamemaker-v${{ needs.check-version.outputs.version }}
          name: GameMaker SDK v${{ needs.check-version.outputs.version }}
          body: |
            ## Colyseus GameMaker SDK v${{ needs.check-version.outputs.version }}

            ### Installation
            1. Download and extract `colyseus-gamemaker-${{ needs.check-version.outputs.version }}.zip`
            2. Open the extracted `Colyseus_SDK/Colyseus_SDK.yyp` in GameMaker
            3. Go to **Tools → Create Local Package**, select all resources, and save the `.yymps` file
            4. Open your own project, go to **Tools → Import Local Package**
            5. Select the `.yymps` file you just created, select all resources, and click **Import**

            ### Supported Platforms
            - Windows (x86_64)
            - macOS (arm64, x86_64)
            - iOS (arm64)
            - Linux (x86_64)
            - Android (arm64, arm32, x86_64)
            - HTML5 (WASM)
          files: colyseus-gamemaker-${{ needs.check-version.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(needs.check-version.outputs.version, 'alpha') || contains(needs.check-version.outputs.version, 'beta') || contains(needs.check-version.outputs.version, 'rc') }}
